<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* global resetting */
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .border{
            color: red;
            border: 3px solid black;
            
            /* padding */
            /* method1 on padding */
            padding-left: 100px;
            padding-bottom: 20px ;
            padding-top: 20px;
            padding-right: 100px;

            /* method2 on padding */
            padding:10px 20px 20px 45px ;

            /* border */
            /* method1 in border*/
            border-width: 5px;
            border-style: dashed;
            border-color: rgb(223, 132, 12);

            /* method2 in border */
            border: 5px dashed black;

            /* other properties */
            border-bottom-style: dashed ;
            border-bottom-color: red ;
            border-bottom-width: 4px ; 

            /* margin */
            /* method1 in margin */
            margin-left: 100px;
            margin-top: 10px;
            margin-bottom: 100px;
            margin-right: 100px;

            /* method2 in margin */
            margin: 100px 30px 40px 100px;
        }
    </style>
</head>
<body>
    <h1 class="border">welcome to world</h1>
</body>
</html>
