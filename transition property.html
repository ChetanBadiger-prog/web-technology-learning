<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        nav{
            height: 100px;
            background-color: goldenrod;
            margin: 0;
            display: flex;
            justify-content: center;
        }
        .menubar{
            justify-content:space-evenly;
            align-items:center;
            display: flex;
            padding-left: 800px;
        }
        .img{
            height: 80px;
            width: 80px;
            justify-content: space-evenly;
            display: flex;
            padding-top: 10px;
        }
        .menubar a{
            text-decoration: none;
            color: black;
            font-weight: bold;
            padding: 0 10px;
        }
        .menubar a:hover {
        color: white;
        transition-property: all;
        transition-duration: 2s;
        text-decoration: underline black;
        transition-timing-function: linear ease ease ease-in ease-out;
        transition-delay: 2s;
        }       
    </style>
</head>
<body>
    <nav>
        <div class="img">
            <img src="https://th.bing.com/th/id/OIP.YRTcCisUcWAVMjv34QSn8gHaEK?w=325&h=182&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3" alt="">
        </div>
        <div class="menubar" style="width: 400px;">
            <a href="">HOME</a>
            <a href="">PRODUCTS</a>
            <a href="">CONTACT</a>
            <a href="">PROFILE</a>
        </div>
    </nav>
</body>
</html>
