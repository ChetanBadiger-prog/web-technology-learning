<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 0;
            justify-content: space-evenly;
            align-items: center;
            display: flex;
            height: 100vh;
        }
        div{
            height: 100px;
            width: 100px;
            background-color: gold;
            display: flex;
            scale: x 2;
        }
        div:hover {
            transform: translate(50px, 20px)
                       skew(10deg, 5deg)     
                       rotate(45deg)         
                       scale(1.3);           
        }
    </style>
</head>
<body>
    <div></div>
</body>
</html>
