<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            background-color: #37deed;
        }
        .container{
            align-items: center;
            justify-content: center;  
            display: inline-block;       
        }
        fieldset {
            background-color: white; 
            padding: 20px;
            border-radius: 10px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.2); /* subtle shadow */
        }
        .signup{
            padding-left: 60px;
            padding-right: 60px;
            background-color: rgb(76, 76, 232);
            color: white;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <form action="">
        <fieldset>
            <div class="container">
            <h1> Signup Form</h1>
            
            <label for="username"></label>
            <input type="text" id="username" placeholder="Username">
            <br><br>
            <label for="Firstname"></label>
            <input type="text" id="Firstname" placeholder="Firstname">
            <br><br>
            <label for="lastname"></label>
            <input type="text" id="lastname" placeholder="Lastname">
            <br><br>
            <label for="phonr_number"></label>
            <input type="text" id="phonr_number" placeholder="Phone number">
            <br><br>
            <label for="Email"></label>
            <input type="text" id="Email" placeholder="Email">
            <br><br>
            <label for="password"></label>
            <input type="text" id="password" placeholder="Password">
            <br><br>
            <input type="checkbox">I agree to Term & Conditions
            <br><br>
            <button class="signup">SignUP</button>
            <br><br>
            <label for="">Already have an account?</label><a href="login.html">Login</a>
            </div>
        </fieldset>
    </form>
</body>
</html>
