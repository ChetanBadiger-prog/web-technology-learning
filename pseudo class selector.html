<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1:first-child{
            color: bisque;
        }
        h1:last-child{
            color: aquamarine;
        }
        h1:first-of-type{
            color: blue;
        }
        h1:last-of-type{
            color: brown;
        }
        h1:nth-child(odd){
            color: blanchedalmond;
        }
    </style>
</head>
<body>
    <div>
        <i>space</i>
