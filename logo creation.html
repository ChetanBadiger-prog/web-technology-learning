<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-weight: bolder;
        }
        /* navigation */
        nav{
            height: 100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: gold;
        }
        #menublock,
        #logoblock{
            height: 100px;
            width: 400px;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
        }

        #menublock > a{
            text-decoration: none;
            color: black;
        }
        #logoblock img{
            height: 140px;
        }
        #photoblock{
            height: 85vh;
            background-color: lightgray;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
        }
        #left,
        #right{
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            height: 500px;
            width: 500px;
            background-color: white;
            border-radius: 30px;
            box-shadow: 0px 0px 12px rgba(0, 0, 0, 0.5);
        }
        #photoblock img{
            height: 500px;
        }
    </style>
</head>
<body>
    <nav>
        <div id="logoblock">
            <img src="https://graphicsprings.com/wp-content/uploads/2023/07/image-58-1024x512.png" alt="img">
        </div>
        <div id="menublock" style="width: 600px;">
            <a href="">HOME</a>
            <a href="">ABOUT</a>
            <a href="">CONTACT</a>
            <a href="">PROFILE</a>
        </div>
        <br>
        <div id="photoblock">
            <div id="left">
                <img src="https://www.designyourway.net/blog/wp-content/uploads/2019/10/s1-62-600x338.jpg" alt="">
            </div>
            <div id="right">
                <img
                style="height: 425px;" 
                src="https://www.bing.com/th/id/OIP.sgvdhnGTJIyQt0-qHS4DuQHaHa?w=193&h=193&c=8&rs=1&qlt=90&o=6&dpr=1.3&pid=3.1&rm=2" alt="img">
            </div>
        </div>
    </nav>
</body>
</html>
