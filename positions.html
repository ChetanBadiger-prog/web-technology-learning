<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 20px;
            background-color: white;
        }
        .parent{
            height: 400px;
            width: 800px;
            margin: 40px;
            display: flex;
            border: 2px solid black;
        }
        .boxes{
            height: 60px;
            width: 60px;
            display: flex;
            border: 2px solid black;
            position: relative;
        }
        #box1{
            background-color: aqua;
        }
        #box2{
            background-color: red;
            /* left: 60px;  */
            /*here it will not chage because it is a by default static position */
            /* top: 80px; */
        }
        #box3{
            background-color: green;
            /* now here it is chage because it is a relative position */
            position: relative;
            top: 20px;
            left: 10px;
        }
        #box4{
            background-color: gold;
            /* here i give absolute as a position it will occupied the place left corner of the browser bottom place */
            position: absolute;
            top: 90px;
            left: 30px;
        }   
    </style>
</head>
<body>
    <div class="parent">
        <div class="boxes" id="box1"></div>
        <div class="boxes" id="box2"></div>
        <div class="boxes" id="box3"></div>
        <div class="boxes" id="box4"></div>
    </div>
</body>
</html>
